services:
  - type: web
    name: assignment-5-dashboard
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --threads 8 app:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/assignment5.db
      - key: APP_SECRET_KEY
        generateValue: true
      - key: WIT_TOKEN
        sync: false
      - key: VERTEX_API_KEY
        sync: false
      - key: DEVICE_API_KEY
        sync: false
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
